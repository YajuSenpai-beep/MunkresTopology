# LaTeX 索引插入工具 — 默认配置
# 复制此文件并根据项目需求修改

# ---- 索引命令模板 ----
# ${key}=排序键  ${display}=显示文字  ${sort}=数学排序键  ${parent}=父条目  ${child}=子条目
templates:
  l1: "\\index{${key}}"
  l1Math: "\\index{${sort}@${display}}"
  l2: "\\index{${parent}!${child}}"

# ---- 文件匹配 ----
# ${num} 替换为章节编号
file_pattern: "Chapter_${num}_*.tex"

# ---- 别名（正文用词 → 索引键）----
aliases:
  "inverse image": ["preimage", "counterimage"]
  "preimage": ["inverse image"]

# ---- 数学符号快捷方式 ----
math_shortcuts:
  "\\mathbb{R}": ["\\R", "\\RR"]
  "\\mathbb{N}": ["\\N", "\\NN"]
  "\\mathbb{Z}": ["\\Z", "\\ZZ"]
  "\\mathbb{Q}": ["\\Q", "\\QQ"]

# ---- 源目录 ----
chapter_source_dir: "../chapters"

# ---- 日志 ----
log_level: "INFO"       # DEBUG | INFO | WARNING | ERROR
log_file: "index_tool.log"
